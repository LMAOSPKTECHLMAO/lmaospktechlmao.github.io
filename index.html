<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$PKTEC#!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-primary: #06060a;
    --bg-secondary: #0c0c14;
    --bg-card: #0f0f1a;
    --bg-card-hover: #141422;
    --bg-folder: #0d0d17;
    --purple-dim: #5b21b6;
    --purple-mid: #7c3aed;
    --purple-bright: #a855f7;
    --purple-glow: #c084fc;
    --purple-ghost: rgba(168, 85, 247, 0.07);
    --purple-ghost-mid: rgba(168, 85, 247, 0.14);
    --text-primary: #e4e4e7;
    --text-secondary: #a1a1aa;
    --text-dim: #5a5a6e;
    --border: rgba(168, 85, 247, 0.1);
    --border-hover: rgba(168, 85, 247, 0.28);
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --blue: #3b82f6;
    --cyan: #06b6d4;
    --pink: #ec4899;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    line-height: 1.6;
    overflow-x: hidden;
    min-height: 100vh;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg-primary); }
  ::-webkit-scrollbar-thumb { background: var(--purple-dim); border-radius: 3px; }

  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(168, 85, 247, 0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(168, 85, 247, 0.025) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 0;
  }
  .bg-grid::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(124, 58, 237, 0.1) 0%, transparent 55%);
  }
  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(130px);
    pointer-events: none;
    z-index: 0;
  }
  .bg-orb-1 { width: 600px; height: 600px; background: rgba(91, 33, 182, 0.08); top: -200px; left: -150px; }
  .bg-orb-2 { width: 400px; height: 400px; background: rgba(168, 85, 247, 0.05); bottom: 10%; right: -100px; }

  .wrapper {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 20px;
    position: relative;
    z-index: 1;
  }

  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(6, 6, 10, 0.85);
    backdrop-filter: blur(24px);
    border-bottom: 1px solid var(--border);
  }
  nav .wrapper {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 54px;
  }
  .nav-brand {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--purple-bright);
    text-decoration: none;
    letter-spacing: -0.02em;
  }
  .nav-brand span { color: var(--text-primary); }
  .nav-right { display: flex; align-items: center; gap: 6px; }
  .nav-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text-secondary);
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    font-family: 'Inter', sans-serif;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .nav-btn:hover {
    border-color: var(--border-hover);
    color: var(--text-primary);
    background: var(--purple-ghost);
  }

  .hero {
    padding: 80px 0 40px;
    text-align: center;
  }
  .hero-logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(2.8rem, 8vw, 4.5rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 16px;
  }
  .hero-logo .dollar { color: var(--purple-dim); }
  .hero-logo .name { color: var(--purple-bright); }
  .hero-logo .hash { color: var(--text-dim); }
  .hero-logo .bang { color: var(--red); }
  .hero-sub {
    color: var(--text-secondary);
    font-size: 0.95rem;
    max-width: 480px;
    margin: 0 auto 32px;
    line-height: 1.7;
  }

  .socials {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .social-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.82rem;
    font-weight: 500;
    transition: all 0.25s;
  }
  .social-link:hover {
    border-color: var(--border-hover);
    color: var(--text-primary);
    background: var(--bg-card-hover);
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(124, 58, 237, 0.1);
  }
  .social-link svg { flex-shrink: 0; }
  .social-link.discord:hover { border-color: rgba(88, 101, 242, 0.4); box-shadow: 0 4px 20px rgba(88, 101, 242, 0.1); }
  .social-link.twitter:hover { border-color: rgba(29, 161, 242, 0.4); box-shadow: 0 4px 20px rgba(29, 161, 242, 0.1); }
  .social-link.github:hover { border-color: rgba(255, 255, 255, 0.15); box-shadow: 0 4px 20px rgba(255, 255, 255, 0.05); }
  .social-link.youtube:hover { border-color: rgba(255, 0, 0, 0.3); box-shadow: 0 4px 20px rgba(255, 0, 0, 0.08); }
  .social-link.telegram:hover { border-color: rgba(0, 136, 204, 0.4); box-shadow: 0 4px 20px rgba(0, 136, 204, 0.1); }

  .social-note {
    font-size: 0.7rem;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 8px;
  }

  .tabs-section { padding: 40px 0 80px; }
  .tabs-bar {
    display: flex;
    gap: 2px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 10px 10px 0 0;
    padding: 6px 6px 0;
    overflow-x: auto;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .tabs-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    padding: 10px 18px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-dim);
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    align-items: center;
    gap: 7px;
    position: relative;
    top: 1px;
  }
  .tab-btn:hover { color: var(--text-secondary); }
  .tab-btn.active {
    color: var(--purple-bright);
    border-bottom-color: var(--purple-bright);
    background: var(--bg-card);
  }
  .tab-count {
    padding: 1px 7px;
    border-radius: 4px;
    background: var(--purple-ghost);
    font-size: 0.65rem;
    color: var(--purple-glow);
  }
  .tab-btn.active .tab-count { background: var(--purple-ghost-mid); }

  .tab-content-area {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 10px 10px;
    min-height: 300px;
  }
  .tab-panel {
    display: none;
    padding: 24px;
    animation: fadeIn 0.2s ease;
  }
  .tab-panel.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .folder { margin-bottom: 20px; }
  .folder:last-child { margin-bottom: 0; }
  .folder-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--bg-folder);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .folder-header:hover {
    border-color: var(--border-hover);
    background: var(--bg-card-hover);
  }
  .folder-icon {
    color: var(--yellow);
    display: flex;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .folder.open .folder-icon { transform: rotate(90deg); }
  .folder-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-primary);
    flex: 1;
  }
  .folder-count {
    font-size: 0.68rem;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }
  .folder-body {
    display: none;
    padding: 6px 0 0 24px;
    border-left: 1px solid var(--border);
    margin-left: 20px;
    margin-top: 8px;
  }
  .folder.open .folder-body { display: block; }

  .tool-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 6px;
    transition: background 0.15s;
    cursor: default;
  }
  .tool-item:hover { background: var(--purple-ghost); }
  .tool-file-icon {
    color: var(--purple-glow);
    flex-shrink: 0;
    display: flex;
  }
  .tool-info { flex: 1; min-width: 0; }
  .tool-filename {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--text-primary);
  }
  .tool-filedesc {
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tool-badge {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.6rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
  }
  .tool-badge.py { background: rgba(34, 197, 94, 0.1); color: var(--green); border: 1px solid rgba(34, 197, 94, 0.15); }
  .tool-badge.js { background: rgba(234, 179, 8, 0.1); color: var(--yellow); border: 1px solid rgba(234, 179, 8, 0.15); }
  .tool-badge.rs { background: rgba(234, 89, 12, 0.1); color: #f97316; border: 1px solid rgba(234, 89, 12, 0.15); }
  .tool-badge.go { background: rgba(6, 182, 212, 0.1); color: var(--cyan); border: 1px solid rgba(6, 182, 212, 0.15); }
  .tool-badge.sh { background: rgba(168, 85, 247, 0.1); color: var(--purple-glow); border: 1px solid rgba(168, 85, 247, 0.15); }

  .tab-empty {
    text-align: center;
    padding: 50px 20px;
    color: var(--text-dim);
    font-size: 0.82rem;
    font-family: 'JetBrains Mono', monospace;
  }
  .tab-empty svg { margin-bottom: 12px; opacity: 0.25; display: block; margin-left: auto; margin-right: auto; }

  footer {
    border-top: 1px solid var(--border);
    padding: 24px 0;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .footer-text {
    font-size: 0.72rem;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }

  @media (max-width: 640px) {
    .hero { padding: 60px 0 28px; }
    .socials { gap: 8px; }
    .social-link { padding: 8px 14px; font-size: 0.75rem; }
    .social-link .social-label { display: none; }
    .tab-btn { padding: 9px 12px; font-size: 0.72rem; }
    .tab-panel { padding: 16px; }
    .folder-body { margin-left: 12px; padding-left: 14px; }
    .tool-filedesc { display: none; }
  }
</style>

<script>
  const tabBtns = document.querySelectorAll('.tab-btn');
  const tabPanels = document.querySelectorAll('.tab-panel');
  tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.dataset.tab;
      tabBtns.forEach(b => b.classList.remove('active'));
      tabPanels.forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + target).classList.add('active');
    });
  });
  function toggleFolder(header) {
    header.parentElement.classList.toggle('open');
  }
</script>
